<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://i.imgur.com/AZpNeAX.png">
    <title>Danz | QR Generate</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #ccc;
      }
      label {
        display: block;
        margin-bottom: 10px;
      }
      input[type="text"] {
        width: 100%;
        padding: 8px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      #generate-button {
        background-color: #4caf50;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      #generate-button:hover {
        background-color: #3e8e41;
      }
      #qr-code {
        display: none;
        margin-top: 20px;
        text-align: center;
      }
      #qr-code img {
        max-width: 100%;
      }
      #download-button {
        display: block;
        margin-top: 10px;
        background-color: #4caf50;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
      }
      #download-button:hover {
        background-color: #3e8e41;
      }

      nav {
  background-color: #333;
  height: 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  border-radius: 30px;
}

.logo a {
  color: #fff;
  font-weight: bold;
  font-size: 24px;
  text-decoration: none;
}

.menu-icon {
  color: #fff;
  font-size: 28px;
  cursor: pointer;
}

.menu {
  display: none;
  flex-direction: column;
  list-style: none;
  margin: 0;
  padding: 0;
  position: absolute;
  top: 50px;
  left: 0;
  width: 100%;
  background-color: #333;
  text-align: center;
}

.menu li {
  margin: 10px 0;
}

.menu li a {
  color: #fff;
  font-weight: bold;
  font-size: 18px;
  text-decoration: none;
}

@media screen and (min-width: 381px) {
  .menu-icon {
    display: none;
  }
  .menu {
    display: flex;
    position: static;
    flex-direction: row;
    justify-content: flex-end;
    background-color: transparent;
  }
  .menu li {
    margin: 0 20px;
  }
}

    </style>
  </head>
  <body>
    <nav>
      <div class="logo">
        <a href="#">Logo</a>
      </div>
      <div class="menu-icon">
        <i class="fa fa-bars"></i>
      </div>
      <ul class="menu">
        <li><a href="index.html">Beranda</a></li>
        <li><a href="qrkode.html">QR Generate</a></li>
        <li><a href="folder.html">SC Dan Sewa Bot</a></li>
        <!--<li><a href="#">Kontak</a></li>-->
      </ul>
    </nav>
    
    <h1>QR Code Generator</h1>
    <div id="qr-code"></div>
    <form>
      <label for="input">Enter text to encode:</label>
      <input type="text" id="input" name="input" placeholder="Enter text here...">
      <button type="button" id="generate-button">Generate QR Code</button>
    </form>
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
      const generateButton = document.getElementById("generate-button");
      const qrCode = document.getElementById("qr-code");

      generateButton.addEventListener("click", () => {
        const inputValue = document.getElementById("input").value;
        if (inputValue === "") {
          alert("Please enter some text");
        } else {
          const qr = new QRious({
            value: inputValue,
            size: 300,
          });
          qrCode.innerHTML = "";
          const qrImage = document.createElement("img");
          qrImage.src = qr.toDataURL("image/png");
          qrCode.appendChild(qrImage);
          const downloadLink = document.createElement("a");
          downloadLink.href = qrImage.src;
          downloadLink.download = "qr-code.png";
          downloadLink.innerText = "Download";
          downloadLink.id = "download-button";
          qrCode.appendChild(downloadLink);
          qrCode.style.display = "block";
        }
      });
    </script>
  </body>
</html>
